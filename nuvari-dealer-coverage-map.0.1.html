<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Nuvari 經銷網絡涵蓋地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#F6F7FA;--panel:#fff;--ink:#1B2430;--soft:#5B6472;
  --border:#E2E5EB;--accent:#0EA5A4;--accent-light:#E3F6F5;
  --north:#3B6FD9;--central:#E08E2C;--south:#1FA67A;--east:#8B5CF6;
  --red:#E0584A;--green:#0E8F6B;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink);}
.app{display:flex;flex-direction:column;height:100vh;}
header{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;}
header h1{font-size:15px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.clabel{font-size:10px;color:var(--soft);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.seg{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px;}
.seg button{border:none;background:transparent;padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--soft);}
.seg button.active{background:var(--ink);color:#fff;}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--soft);font-size:11px;font-weight:600;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.btn:hover{border-color:var(--ink);color:var(--ink);}
.btn-red{border-color:#f0c9c5;color:var(--red);}
.btn-red.armed{background:var(--red);color:#fff;border-color:var(--red);}
.btn-teal{border-color:var(--accent);color:var(--accent);}
.btn-teal:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-on{background:var(--ink);color:#fff;border-color:var(--ink);}
.radius-wrap{display:flex;align-items:center;gap:4px;}
.radius-wrap input{width:48px;padding:4px 6px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;text-align:center;}
.radius-wrap input:focus{outline:none;border-color:var(--accent);}
.radius-unit{font-size:10.5px;color:var(--soft);font-weight:600;}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
/* main */
.main{flex:1;display:flex;min-height:0;}
#map{flex:1;min-width:0;}
/* sidebar */
.sidebar{width:350px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tabs button{flex:1;border:none;background:transparent;padding:8px 4px;font-size:11px;font-weight:700;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s;}
.sidebar-tabs button.active{color:var(--ink);border-bottom-color:var(--ink);}
.tab-panel{display:none;overflow-y:auto;flex:1;padding:11px;}
.tab-panel.active{display:block;}
/* legend */
.legend-box{border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:11px;background:#FAFBFC;}
.ltitle{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--soft);margin-bottom:6px;}
.lrow{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px;}
.swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.07);}
/* region groups */
.region-group{margin-bottom:11px;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.region-head{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;cursor:pointer;background:#FAFBFC;}
.region-head:hover{background:var(--accent-light);}
.rname{display:flex;align-items:center;gap:7px;font-weight:700;font-size:12px;}
.rdot{width:9px;height:9px;border-radius:50%;}
.rstat{font-size:10px;color:var(--soft);}
table.ct{width:100%;border-collapse:collapse;font-size:11px;}
table.ct th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.02em;color:var(--soft);padding:4px 8px;border-top:1px solid var(--border);font-weight:600;}
table.ct td{padding:5px 8px;border-top:1px solid #F0F1F4;vertical-align:middle;}
table.ct tbody tr{cursor:pointer;}
table.ct tbody tr:hover{background:var(--accent-light);}
.cname{font-weight:600;}
.cname .en{display:block;font-size:9px;color:var(--soft);font-weight:400;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.totals{border-top:2px solid var(--ink);margin-top:4px;padding-top:8px;font-size:11.5px;}
.totals .row{display:flex;justify-content:space-between;padding:2px 0;}
.totals .v{font-weight:700;font-variant-numeric:tabular-nums;}
.footnote{margin-top:11px;font-size:10px;color:var(--soft);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;}
/* shops tab */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light);}
.upload-zone .uz-icon{font-size:28px;margin-bottom:8px;}
.upload-zone .uz-title{font-weight:700;font-size:13px;margin-bottom:4px;}
.upload-zone .uz-sub{font-size:11px;color:var(--soft);}
.shop-layer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.shop-layer-header .slh-title{font-weight:700;font-size:13px;}
.shop-layer-header .slh-actions{display:flex;gap:5px;}
.status-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.sf-chip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:600;color:var(--soft);background:var(--bg);transition:all .15s;}
.sf-chip.active{border-color:var(--dot-color,var(--ink));color:var(--dot-color,var(--ink));background:#fff;}
.sf-chip .sf-dot{width:8px;height:8px;border-radius:50%;background:var(--dot-color,var(--soft));}
.sf-chip .sf-count{font-size:9.5px;background:var(--bg);border-radius:10px;padding:0 5px;}
.sf-chip.active .sf-count{background:var(--accent-light);}
.shop-table-wrap{overflow-x:auto;}
table.sh-table{width:100%;border-collapse:collapse;font-size:10.5px;}
table.sh-table th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--soft);padding:4px 6px;border-bottom:1px solid var(--border);}
table.sh-table td{padding:5px 6px;border-bottom:1px solid #F0F1F4;vertical-align:middle;}
table.sh-table tbody tr{cursor:pointer;}
table.sh-table tbody tr:hover{background:var(--accent-light);}
.sh-name{font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sh-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;}
/* scenarios */
.scenario-form{display:flex;gap:6px;margin-bottom:11px;}
.scenario-form input{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;}
.scenario-form input:focus{outline:none;border-color:var(--accent);}
.scenario-empty{text-align:center;color:var(--soft);font-size:12px;padding:24px 12px;border:1px dashed var(--border);border-radius:9px;}
.scenario-card{border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:7px;}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.sc-name{font-weight:700;font-size:12.5px;}
.sc-meta{font-size:10px;color:var(--soft);margin-top:1px;}
.sc-actions{display:flex;gap:4px;flex-shrink:0;}
.sc-actions button{border:1px solid var(--border);background:transparent;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;cursor:pointer;color:var(--soft);}
.sc-actions .load-btn:hover{border-color:var(--accent);color:var(--accent);}
.sc-actions .del-btn:hover{border-color:var(--red);color:var(--red);}
.sc-badges{display:flex;flex-wrap:wrap;gap:4px;}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--border);color:var(--soft);}
/* dealer pin marker */
.dealer-pin{width:16px;height:16px;border-radius:50%;background:#1B2430;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45);cursor:grab;}
.dealer-pin:active{cursor:grabbing;}
/* bikeshop popup */
.bs-popup{font-family:inherit;min-width:160px;}
.bs-name{font-weight:700;font-size:13px;margin-bottom:5px;}
.bs-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px;}
.bs-addr{font-size:11px;color:var(--soft);margin-bottom:7px;line-height:1.4;}
.bs-gmaps{display:block;text-align:center;font-size:11px;font-weight:700;padding:5px;border:1px solid var(--accent);color:var(--accent);border-radius:6px;text-decoration:none;}
.bs-gmaps:hover{background:var(--accent);color:#fff;}
/* dealer popup */
.shop-popup{font-family:inherit;min-width:175px;}
.shop-popup input{width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;font-family:inherit;}
.shop-popup input:focus{outline:none;border-color:var(--accent);}
.shop-meta{font-size:10.5px;color:var(--soft);margin-bottom:7px;}
.popup-btns{display:flex;flex-direction:column;gap:5px;}
.popup-btns a,.popup-btns button{display:block;width:100%;text-align:center;font-size:11px;font-weight:700;padding:5px;border-radius:6px;cursor:pointer;text-decoration:none;border:1px solid;}
.popup-btns a{border-color:var(--accent);color:var(--accent);}
.popup-btns a:hover{background:var(--accent);color:#fff;}
.popup-btns button{background:#fff;color:var(--red);border-color:#f0c9c5;}
.popup-btns button:hover{background:var(--red);color:#fff;border-color:var(--red);}
.leaflet-popup-content-wrapper{border-radius:10px;}
.leaflet-control-layers{font-size:11px;}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="pw-gate" style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;position:fixed;top:0;left:0;background:#F6F7FA;z-index:99999;">
  <div style="background:#fff;border:1px solid #E2E5EB;border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;">
    <div style="font-size:22px;margin-bottom:6px;">🗺️</div>
    <div style="font-size:16px;font-weight:700;color:#1B2430;margin-bottom:4px;">Nuvari Sales Map</div>
    <div style="font-size:12px;color:#5B6472;margin-bottom:24px;">經銷網絡涵蓋地圖 · Internal use only</div>
    <input id="pw-input" type="password" placeholder="Enter password" style="width:100%;padding:10px 14px;border:1px solid #E2E5EB;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')checkPw()"/>
    <div id="pw-error" style="font-size:12px;color:#E0584A;min-height:16px;margin-bottom:8px;"></div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#0EA5A4;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Enter</button>
  </div>
</div>
<script>
(function(){
  const HASH = '7a3f9b2e1d4c8a6f0e5b7d2c9a1f4e8b3d6c0a7f2e9b5d1c4a8f3e6b0d2c9a1';
  function h(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return Math.abs(h).toString(16).padStart(8,'0');}
  const SESSION_KEY='nuvari_map_auth';
  if(sessionStorage.getItem(SESSION_KEY)==='ok'){document.getElementById('pw-gate').style.display='none';}
  window.checkPw=function(){
    const val=document.getElementById('pw-input').value;
    if(val==='Nuvari06302026!'){
      sessionStorage.setItem(SESSION_KEY,'ok');
      document.getElementById('pw-gate').style.display='none';
    } else {
      document.getElementById('pw-error').textContent='Incorrect password. Try again.';
      document.getElementById('pw-input').value='';
      document.getElementById('pw-input').focus();
    }
  };
})();
</script>
<div class="app">
  <header>
    <h1>Nuvari 經銷網絡涵蓋地圖 <span style="color:var(--soft);font-weight:500;font-size:13px;">· Dealer Coverage Map</span></h1>
    <div class="controls">
      <span class="clabel">底圖</span>
      <div class="seg" id="colorModeSeg">
        <button data-mode="density" class="active">密度</button>
        <button data-mode="region">分區</button>
        <button data-mode="coverage">覆蓋</button>
      </div>
      <span class="clabel">半徑</span>
      <div class="radius-wrap">
        <input type="number" id="radiusInput" min="2" max="20" step="1" value="10"/>
        <span class="radius-unit">km</span>
      </div>
      <div class="sep"></div>
      <button class="btn btn-teal" id="gmapsBtn">📍 Google Maps ↗</button>
      <button class="btn btn-red" id="clearBtn">清除店點 Clear pins</button>
      <div class="sep"></div>
      <input type="file" id="csvInput" accept=".csv,.txt" style="display:none"/>
      <button class="btn" id="uploadCsvBtn">📂 Upload Shop CSV</button>
      <button class="btn" id="toggleShopsBtn" style="display:none">候選店 ●</button>
    </div>
  </header>
  <div class="main">
    <div id="map"></div>
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="active" data-tab="stats">數據 Stats</button>
        <button data-tab="shops">候選店 <span id="shopTabBadge"></span></button>
        <button data-tab="scenarios">方案 Scenarios</button>
      </div>
      <div id="tab-stats" class="tab-panel active"></div>
      <div id="tab-shops" class="tab-panel"></div>
      <div id="tab-scenarios" class="tab-panel">
        <div class="scenario-form">
          <input type="text" id="scenarioNameInput" placeholder="方案名稱 e.g. 北中10km初稿…"/>
          <button class="btn btn-teal" id="saveScenarioBtn">儲存</button>
        </div>
        <div id="scenarioList"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

/* ══ geo helpers ══ */
function ptInRing(px,py,ring){let inside=false;for(let i=0,j=ring.length-1;i<ring.length;j=i++){const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;}return inside;}
function ptInPoly(px,py,rings){if(!ptInRing(px,py,rings[0]))return false;for(let k=1;k<rings.length;k++)if(ptInRing(px,py,rings[k]))return false;return true;}
function findCounty(lat,lng){for(const f of COUNTY_GEOJSON.features){const g=f.geometry;if(g.type==='Polygon'){if(ptInPoly(lng,lat,g.coordinates))return f.properties.COUNTYENG;}else if(g.type==='MultiPolygon'){for(const p of g.coordinates)if(ptInPoly(lng,lat,p))return f.properties.COUNTYENG;}}return null;}

/* ══ color helpers ══ */
function densityColor(d){return d>3000?'#163E82':d>1500?'#2E66C4':d>800?'#5E97DD':d>400?'#9CC1ED':d>150?'#C9DCF5':'#EAF1FB';}
function coverageColor(avgD,t){if(avgD===Infinity)return'#E4E7EC';const r=avgD/t;return r<=0.6?'#0E8F6B':r<=1?'#6FBF99':r<=1.6?'#F2B84B':'#E0584A';}
function avgDist(area,n){return n>0?0.5*Math.sqrt(area/n):Infinity;}
function shopCount(key){return shops.filter(s=>s.county===key).length;}
function fillOpacity(){const z=map.getZoom();return z>=12?0.08:z>=10.5?0.28:0.72;}
function styleForCounty(key){const info=COUNTY_DATA[key];if(!info)return{color:'#AEB4BD',weight:1,fillColor:'#EDEFF2',fillOpacity:0.4};let fill;if(colorMode==='region')fill=REGIONS[info.region].color;else if(colorMode==='coverage')fill=coverageColor(avgDist(info.area,shopCount(key)),targetRadiusKm);else fill=densityColor(info.pop/info.area);return{color:'#2A3140',weight:1,fillColor:fill,fillOpacity:fillOpacity()};}
function recolorCounties(){Object.keys(countyLayers).forEach(k=>countyLayers[k].setStyle(styleForCounty(k)));}

/* ══ Google Maps ══ */
function gmapsPoint(lat,lng){return`https://www.google.com/maps?q=${lat.toFixed(6)},${lng.toFixed(6)}&z=17`;}

/* ══ map init ══ */
function initMap(){
  map=L.map('map',{zoomSnap:0.25,minZoom:7,maxZoom:18}).setView([23.75,121.0],8);
  const light=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19});
  const streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19});
  const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'&copy; Esri Maxar',maxZoom:19});
  light.addTo(map);
  L.control.layers({'簡約 Light':light,'街道 Streets':streets,'衛星 Satellite':sat},null,{position:'topright',collapsed:true}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  circlesLayer=L.layerGroup().addTo(map);
  bikeshopGroup=L.layerGroup().addTo(map);
  const geo=L.geoJSON(COUNTY_GEOJSON,{
    style:f=>styleForCounty(f.properties.COUNTYENG),
    onEachFeature:(feature,layer)=>{
      const key=feature.properties.COUNTYENG;
      countyLayers[key]=layer;
      layer.on('click',e=>{L.DomEvent.stopPropagation(e);addShop(e.latlng.lat,e.latlng.lng);});
      layer.on('mouseover',()=>layer.setStyle({weight:2.5}));
      layer.on('mouseout',()=>layer.setStyle({weight:1}));
      const info=COUNTY_DATA[key];
      if(info)layer.bindTooltip(`${info.zh} ${key}`,{sticky:true,opacity:0.9});
    }
  }).addTo(map);
  map.on('click',e=>addShop(e.latlng.lat,e.latlng.lng));
  map.on('zoomend',recolorCounties);
  map.fitBounds(geo.getBounds(),{padding:[14,14]});
}

/* ══ render dealer pins (draggable) ══ */
function renderShopsOnMap(){
  markersLayer.clearLayers();
  circlesLayer.clearLayers();
  Object.keys(markerRefs).forEach(k=>delete markerRefs[k]);
  shops.forEach(shop=>{
    // Coverage circle
    const circle=L.circle([shop.lat,shop.lng],{
      radius:targetRadiusKm*1000,color:'#1B2430',weight:1.2,
      fillColor:'#1B2430',fillOpacity:0.05,dashArray:'6,5'
    }).addTo(circlesLayer);
    // Draggable marker
    const marker=L.marker([shop.lat,shop.lng],{draggable:true,icon:dealerIcon()}).addTo(markersLayer);
    markerRefs[shop.id]={marker,circle};
    // Real-time drag: circle follows marker
    marker.on('drag',e=>{
      const ll=e.target.getLatLng();
      if(markerRefs[shop.id])markerRefs[shop.id].circle.setLatLng(ll);
    });
    // Drag end: persist new position
    marker.on('dragend',e=>{
      const ll=e.target.getLatLng();
      shop.lat=ll.lat; shop.lng=ll.lng;
      shop.county=findCounty(ll.lat,ll.lng);
      renderStats(); recolorCounties(); persistShops();
    });
    marker.bindPopup(buildDealerPopup(shop),{maxWidth:220});
    marker.on('click',e=>L.DomEvent.stopPropagation(e));
    marker.on('popupopen',e=>{
      const el=e.popup.getElement();
      el.querySelector('.pi').addEventListener('change',ev=>{shop.name=ev.target.value||shop.name;persistShops();});
      el.querySelector('.pd').addEventListener('click',()=>{map.closePopup();removeShop(shop.id);});
    });
  });
}

/* only rebuild circles (when radius changes) — preserves drag state */
function rebuildCircles(){
  circlesLayer.clearLayers();
  shops.forEach(shop=>{
    const circle=L.circle([shop.lat,shop.lng],{
      radius:targetRadiusKm*1000,color:'#1B2430',weight:1.2,
      fillColor:'#1B2430',fillOpacity:0.05,dashArray:'6,5'

    if(markerRefs[shop.id])markerRefs[shop.id].circle=circle;
  });
}

  bikeshopGroup.clearLayers();

/* ══ CSV parser ══ */
function parseCSVLine(line){
  const res=[];let inQ=false,cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);return res;
}
function detectCol(headers,...names){for(const n of names){const i=headers.findIndex(h=>h===n||h.startsWith(n));if(i>=0)return i;}return -1;}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return null;
  const headers=parseCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const latI=detectCol(headers,'lat','latitude','緯度','lat.');
  const lngI=detectCol(headers,'lng','lon','longitude','long','經度');
  const nameI=detectCol(headers,'name','名稱','店名','shop_name','shopname','title');
  const addrI=detectCol(headers,'address','addr','地址','location','address1');
  const stI=detectCol(headers,'status','狀態','狀況','state','type','category');
  if(latI<0||lngI<0)return null;
  return lines.slice(1).map(line=>{
    const vals=parseCSVLine(line).map(v=>v.trim().replace(/^"|"$/g,''));
    const lat=parseFloat(vals[latI]),lng=parseFloat(vals[lngI]);
    if(isNaN(lat)||isNaN(lng))return null;
    const rawStatus=stI>=0?(vals[stI]||'').toLowerCase().trim():'potential';
    const status=rawStatus||'potential';
    return{name:nameI>=0?vals[nameI]:'Unnamed',address:addrI>=0?vals[addrI]:'',lat,lng,status};
  }).filter(Boolean);
}
function handleCSVUpload(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const result=parseCSV(e.target.result);
    if(result===null){toast('無法解析 CSV — 需要 lat/lng 欄位','err');return;}
    if(result.length===0){toast('CSV 沒有有效座標資料','err');return;}
    bikeshopData=result;
    const statuses=[...new Set(bikeshopData.map(s=>s.status))];
    statusFilters=new Set(statuses);
    showBikeshops=true;
    persistBikeshops();
    rebuildBikeshopMarkers();
    renderShopsTab();
    switchTab('shops');
    updateShopsLayerBtn();
    document.getElementById('toggleShopsBtn').style.display='';
    toast(`載入 ${bikeshopData.length} 家候選店 · Loaded ${bikeshopData.length} shops`);
  };
  reader.readAsText(file,'utf-8');
}

/* ══ stats sidebar ══ */
function renderStats(){
  const el=document.getElementById('tab-stats');
  let html=`<div class="legend-box">${legendHtml()}</div>`;
  let gPop=0,gArea=0,gShops=0;
  REGION_ORDER.forEach(rk=>{
    const reg=REGIONS[rk];
    const counties=Object.entries(COUNTY_DATA).filter(([,v])=>v.region===rk);
    let rPop=0,rArea=0,rShops=0,rows='';
    counties.forEach(([key,info])=>{
      const n=shopCount(key),ad=avgDist(info.area,n);
      rPop+=info.pop;rArea+=info.area;rShops+=n;gPop+=info.pop;gArea+=info.area;gShops+=n;
      const dot=n===0?'#C7CBD3':(ad<=targetRadiusKm?'var(--green)':'var(--red)');
      rows+=`<tr data-county="${esc(key)}">
        <td class="cname">${esc(info.zh)}<span class="en">${esc(key)}</span></td>
        <td class="num">${(info.pop/1000).toFixed(0)}k</td>
        <td class="num">${Math.round(info.pop/info.area).toLocaleString()}</td>
        <td class="num">${n}</td>
        <td class="num">${ad===Infinity?'—':ad.toFixed(1)+'km'}</td>
        <td><span class="sdot" style="background:${dot}"></span></td>
      </tr>`;
    });
    const rad=avgDist(rArea,rShops);
    html+=`<div class="region-group">
      <div class="region-head" data-region="${rk}">
        <span class="rname"><span class="rdot" style="background:${reg.color}"></span>${reg.label} <span style="color:var(--soft);font-weight:500;">${reg.en}</span></span>
        <span class="rstat">${rShops} 店 · ${rad===Infinity?'—':rad.toFixed(1)+'km avg'}</span>
      </div>
      <table class="ct"><thead><tr><th>縣市</th><th class="num">人口</th><th class="num">密度</th><th class="num">店</th><th class="num">距離</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  });
  const gad=avgDist(gArea,gShops);
  html+=`<div class="totals">
    <div class="row"><span>總人口</span><span class="v">${(gPop/1e6).toFixed(2)}M</span></div>
    <div class="row"><span>面積</span><span class="v">${Math.round(gArea).toLocaleString()} km²</span></div>
    <div class="row"><span>店點數 Pins</span><span class="v">${shops.length}</span></div>
    <div class="row"><span>整體平均距離</span><span class="v">${gad===Infinity?'—':gad.toFixed(1)+' km'}</span></div>
  </div>
  <div class="footnote">平均距離 ≈ 0.5×√(面積÷店數)，假設均勻分布。人口與面積為內政部近期概略值。</div>`;
  el.innerHTML=html;
  el.querySelectorAll('tr[data-county]').forEach(tr=>tr.addEventListener('click',()=>{
    const layer=countyLayers[tr.dataset.county];
    if(layer)map.fitBounds(layer.getBounds(),{padding:[40,40]});
  }));
  el.querySelectorAll('.region-head').forEach(h=>h.addEventListener('click',()=>{
    const keys=Object.entries(COUNTY_DATA).filter(([,v])=>v.region===h.dataset.region).map(([k])=>k);
    let b=null;keys.forEach(k=>{const l=countyLayers[k];if(l)b=b?b.extend(l.getBounds()):l.getBounds();});
    if(b)map.fitBounds(b,{padding:[28,28]});
  }));
}

      <tbody>${rows}</tbody>
    </table>
    ${visible.length>200?`<div style="font-size:10.5px;color:var(--soft);padding:6px 0">顯示前200筆，共${visible.length}筆 visible</div>`:''}
  </div>`;
  // Bind chips
  el.querySelectorAll('.sf-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const st=chip.dataset.status;
      if(statusFilters.has(st))statusFilters.delete(st);else statusFilters.add(st);
      persistBikeshops();
      rebuildBikeshopMarkers();
      renderShopsTab();
    });
  });
  // Bind table rows - fly to shop
  el.querySelectorAll('tr[data-lat]').forEach(tr=>{
    tr.addEventListener('click',()=>map.setView([parseFloat(tr.dataset.lat),parseFloat(tr.dataset.lng)],15));
  });
  // Reupload
  const reb=el.querySelector('#reuploadBtn');
  if(reb)reb.addEventListener('click',()=>document.getElementById('csvInput').click());
  // Inline toggle
  const itb=el.querySelector('#inlineToggleBtn');
  if(itb)itb.addEventListener('click',()=>{showBikeshops=!showBikeshops;rebuildBikeshopMarkers();renderShopsTab();persistBikeshops();});
}
function updateShopsLayerBtn(){
  const btn=document.getElementById('toggleShopsBtn');
  if(!btn||bikeshopData.length===0){if(btn)btn.style.display='none';return;}
  btn.style.display='';
  btn.className='btn'+(showBikeshops?' btn-on':'');
  btn.textContent=`候選店 ${showBikeshops?'●':'○'}`;
}
function setupDropzone(zone){
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleCSVUpload(f);});
}

/* ══ scenarios ══ */
async function loadScenarios(){try{const r=await window.storage.get('nuvari_scenarios',false);return r&&r.value?JSON.parse(r.value):[];}catch{return[];}}
async function saveScenarios(list){try{await window.storage.set('nuvari_scenarios',JSON.stringify(list),false);}catch(e){console.error(e);}}
async function renderScenarios(){
  const list=await loadScenarios();
  const el=document.getElementById('scenarioList');
  if(list.length===0){el.innerHTML=`<div class="scenario-empty">目前沒有儲存的方案<br>Save your current state above.</div>`;return;}
  el.innerHTML=list.map(sc=>{
    const isActive=sc.id===activeScenarioId;
    const d=new Date(sc.savedAt);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return`<div class="scenario-card" data-id="${esc(sc.id)}">
      <div class="sc-top"><div>
        <div class="sc-name">${esc(sc.name)}${isActive?` <span style="font-size:10px;color:var(--accent)">● 已載入</span>`:''}</div>
        <div class="sc-meta">${ds} · ${sc.shops.length} pins · ${sc.targetRadiusKm}km</div>
      </div><div class="sc-actions">
        <button class="load-btn">載入</button><button class="del-btn">刪除</button>
      </div></div>
      <div class="sc-badges">${REGION_ORDER.map(rk=>{const c=sc.shops.filter(s=>s.county&&COUNTY_DATA[s.county]&&COUNTY_DATA[s.county].region===rk).length;return c>0?`<span class="badge">${REGIONS[rk].label} ${c}</span>`:''}).join('')}<span class="badge">${sc.colorMode||'density'}</span></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.scenario-card').forEach(card=>{
    card.querySelector('.load-btn').addEventListener('click',()=>loadScenario(card.dataset.id));
    card.querySelector('.del-btn').addEventListener('click',()=>deleteScenario(card.dataset.id));
  });
}
async function saveCurrentScenario(){
  const inp=document.getElementById('scenarioNameInput');
  const name=inp.value.trim();
  if(!name){inp.focus();inp.style.borderColor='var(--red)';setTimeout(()=>inp.style.borderColor='',1600);return;}
  const list=await loadScenarios();
  const sc={id:'sc'+Date.now().toString(36),name,savedAt:Date.now(),shops:JSON.parse(JSON.stringify(shops)),targetRadiusKm,colorMode};
  list.unshift(sc);await saveScenarios(list);
  activeScenarioId=sc.id;inp.value='';
  toast(`方案「${name}」已儲存`);
  renderScenarios();
}
async function loadScenario(id){
  const list=await loadScenarios();
  const sc=list.find(s=>s.id===id);if(!sc)return;
  shops=JSON.parse(JSON.stringify(sc.shops));
  targetRadiusKm=sc.targetRadiusKm;colorMode=sc.colorMode||'density';
  activeScenarioId=id;
  document.getElementById('radiusInput').value=targetRadiusKm;
  document.querySelectorAll('#colorModeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.mode===colorMode));
  renderAll();renderScenarios();persistShops();
  toast(`方案「${sc.name}」已載入`);
}
async function deleteScenario(id){
  let list=await loadScenarios();
  const sc=list.find(s=>s.id===id);
  list=list.filter(s=>s.id!==id);
  await saveScenarios(list);
  if(activeScenarioId===id)activeScenarioId=null;
  if(sc)toast(`已刪除方案「${sc.name}」`);
  renderScenarios();
}

/* ══ tab switching ══ */
function switchTab(name){
  document.querySelectorAll('.sidebar-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
  if(name==='scenarios')renderScenarios();
  if(name==='shops')renderShopsTab();
}

/* ══ clear - two-tap ══ */
function handleClearBtn(){
  const btn=document.getElementById('clearBtn');
  if(!clearArmed){
    clearArmed=true;btn.textContent='確認清除？ Confirm?';btn.classList.add('armed');
    clearArmTimer=setTimeout(()=>{clearArmed=false;btn.textContent='清除店點 Clear pins';btn.classList.remove('armed');},3000);
  }else{
    clearTimeout(clearArmTimer);clearArmed=false;btn.textContent='清除店點 Clear pins';btn.classList.remove('armed');
    shops=[];activeScenarioId=null;renderAll();persistShops();toast('店點已清除');
  }
}

/* ══ renderAll / renderVisual ══ */
function renderAll(){renderShopsOnMap();renderStats();recolorCounties();}
function renderVisual(){renderStats();recolorCounties();}

/* ══ controls ══ */
function bindControls(){
  document.getElementById('colorModeSeg').addEventListener('click',e=>{
    const btn=e.target.closest('button');if(!btn)return;
    colorMode=btn.dataset.mode;
    document.querySelectorAll('#colorModeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.mode===colorMode));
    recolorCounties();renderVisual();persistSettings();
  });
  const rinput=document.getElementById('radiusInput');
  function applyRadius(){let v=parseInt(rinput.value,10);if(isNaN(v)||v<2)v=2;if(v>20)v=20;rinput.value=v;targetRadiusKm=v;rebuildCircles();recolorCounties();renderVisual();persistSettings();}
  rinput.addEventListener('change',applyRadius);
  rinput.addEventListener('keydown',e=>{if(e.key==='Enter')applyRadius();});
  document.getElementById('gmapsBtn').addEventListener('click',()=>window.open(gmapsView(),'_blank','noopener'));
  document.getElementById('clearBtn').addEventListener('click',handleClearBtn);
  document.getElementById('csvInput').addEventListener('change',e=>{const f=e.target.files[0];if(f){handleCSVUpload(f);e.target.value='';}});
  document.getElementById('uploadCsvBtn').addEventListener('click',()=>document.getElementById('csvInput').click());
  document.getElementById('toggleShopsBtn').addEventListener('click',()=>{showBikeshops=!showBikeshops;rebuildBikeshopMarkers();renderShopsTab();persistBikeshops();});
  document.querySelectorAll('.sidebar-tabs button').forEach(btn=>{
    btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
  });
  document.getElementById('saveScenarioBtn').addEventListener('click',saveCurrentScenario);
  document.getElementById('scenarioNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveCurrentScenario();});
  // global drag-drop on map area
  const mapEl=document.getElementById('map');
  mapEl.addEventListener('dragover',e=>e.preventDefault());
  mapEl.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.csv')||f.name.endsWith('.txt')))handleCSVUpload(f);});
}

/* ══ persistence ══ */
async function persistShops(){try{await window.storage.set('nuvari_active_shops',JSON.stringify(shops),false);}catch(e){}}
async function persistSettings(){try{await window.storage.set('nuvari_settings',JSON.stringify({targetRadiusKm,colorMode}),false);}catch(e){}}
async function persistBikeshops(){
  try{
    await window.storage.set('nuvari_bikeshops',JSON.stringify({data:bikeshopData,filters:[...statusFilters],visible:showBikeshops}),false);
    const badge=document.getElementById('shopTabBadge');if(badge&&bikeshopData.length>0)badge.textContent=`(${bikeshopData.length})`;
  }catch(e){}
}
async function loadSession(){
  try{const r=await window.storage.get('nuvari_active_shops',false);if(r&&r.value)shops=JSON.parse(r.value);}catch{shops=[];}
  try{const r=await window.storage.get('nuvari_settings',false);if(r&&r.value){const s=JSON.parse(r.value);if(s.targetRadiusKm)targetRadiusKm=Math.min(20,Math.max(2,s.targetRadiusKm));if(s.colorMode)colorMode=s.colorMode;}}catch{}
  try{
    const r=await window.storage.get('nuvari_bikeshops',false);
    if(r&&r.value){
      const b=JSON.parse(r.value);
      if(b.data&&b.data.length>0){
        bikeshopData=b.data;
        statusFilters=new Set(b.filters||[...new Set(bikeshopData.map(s=>s.status))]);
        showBikeshops=b.visible!==false;
        const badge=document.getElementById('shopTabBadge');if(badge)badge.textContent=`(${bikeshopData.length})`;
        document.getElementById('toggleShopsBtn').style.display='';
      }
    }
  }catch{}
}

/* ══ boot ══ */
(async function start(){
  initMap();
  bindControls();
  await loadSession();
  document.getElementById('radiusInput').value=targetRadiusKm;
  document.querySelectorAll('#colorModeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.mode===colorMode));
  renderAll();
  renderShopsTab();
  rebuildBikeshopMarkers();
  updateShopsLayerBtn();
})();
</script>
</body>
</html>
